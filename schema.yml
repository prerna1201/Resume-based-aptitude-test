openapi: 3.0.3
info:
  title: Resume Based Aptitude Test API
  version: 1.0.0
  description: API documentation for Resume Based Aptitude Test Platform
paths:
  /api/resumes/upload/:
    post:
      operationId: api_resumes_upload_create
      tags:
      - api
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Resume'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Resume'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Resume'
          description: ''
  /api/schema/:
