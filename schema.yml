          description: No response body
  /api/users/register/:
    post:
      operationId: api_users_register_create
      tags:
      - api
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
components:
  schemas:
    CategoryEnum:
      enum:
      - python
      - java
      - c
      - c++
      - sql
      - html
      - css
      - javascript
      - react
      - django
      - aptitude
      type: string
      description: |-
        * `python` - Python
        * `java` - Java
        * `c` - C
        * `c++` - C++
        * `sql` - SQL
        * `html` - HTML
        * `css` - CSS
        * `javascript` - JavaScript
        * `react` - React
        * `django` - Django
        * `aptitude` - Aptitude
    DifficultyEnum:
      enum:
      - easy
      - medium
      - hard
      type: string
      description: |-
        * `easy` - Easy
        * `medium` - Medium
        * `hard` - Hard
    Question:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        question_text:
          type: string
        option1:
          type: string
          maxLength: 255
        option2:
          type: string
          maxLength: 255
        option3:
          type: string
          maxLength: 255
        option4:
          type: string
          maxLength: 255
        correct_answer:
          type: string
          maxLength: 255
        category:
          $ref: '#/components/schemas/CategoryEnum'
        difficulty:
          $ref: '#/components/schemas/DifficultyEnum'
      required:
      - category
      - correct_answer
      - id
      - option1
      - option2
      - option3
      - option4
      - question_text
    Result:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        score:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        total_questions:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        submitted_at:
          type: string
          format: date-time
          readOnly: true
        test:
          type: integer
          nullable: true
      required:
      - id
      - score
      - submitted_at
    Resume:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        resume:
          type: string
          format: uri
        uploaded_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - id
      - resume
      - uploaded_at
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
