<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | AptiResume AI</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/register.css">

</head>

<body>

    <div class="container">

        <!-- Left Side -->

        <div class="left-section">

            <h1>AptiResume AI</h1>

            <p>
                Create your account and start preparing smarter with
                AI-powered resume analysis and personalized aptitude tests.
            </p>

            <img src="https://undraw.co/api/illustrations/secure-login.svg"
                alt="Register Illustration">

        </div>

        <!-- Right Side -->

        <div class="right-section">

            <div class="register-box">

                <h2>Create Account</h2>

                <p>Let's get you started!</p>

                <form id="registerForm">

                    <div class="input-box">

                        <i class="bi bi-person"></i>

                        <input
                            type="text"
                            placeholder="Full Name"
                            id="name">

                    </div>

                    <div class="input-box">

                        <i class="bi bi-envelope"></i>

                        <input
                            type="email"
                            placeholder="Email Address"
                            id="email">

                    </div>

                    <div class="input-box">

                        <i class="bi bi-mortarboard"></i>

                        <input
                            type="text"
                            placeholder="College Name"
                            id="college">

                    </div>

                    <div class="input-box">

                        <i class="bi bi-diagram-3"></i>

                        <input
                            type="text"
                            placeholder="Branch"
                            id="branch">

                    </div>

                    <div class="input-box">

                        <i class="bi bi-calendar"></i>

                        <select id="year">

                            <option>Select Year</option>

                            <option>1st Year</option>

                            <option>2nd Year</option>

                            <option>3rd Year</option>

                            <option>4th Year</option>

                        </select>

                    </div>

                    <div class="input-box">

                        <i class="bi bi-lock"></i>

                        <input
                            type="password"
                            placeholder="Password"
                            id="password">

                        <i class="bi bi-eye toggle-password"></i>

                    </div>

                    <div class="input-box">

                        <i class="bi bi-lock-fill"></i>

                        <input
                            type="password"
                            placeholder="Confirm Password"
                            id="confirmPassword">

                    </div>

                    <button type="submit">

                        Register

                    </button>

                </form>

                <div class="bottom-text">

                    Already have an account?

                    <a href="login.html">

                        Login

                    </a>

                </div>

            </div>

        </div>

    </div>

<script src="js/register.js"></script>

</body>

</html>
