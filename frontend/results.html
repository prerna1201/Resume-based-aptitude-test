<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Results | AptiResume AI</title>

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="css/results.css">

</head>

<body>

    <div class="results-container">

        <div class="results-box">

            <h1>

                Test Results

            </h1>

            <h2 id="candidateName">

                Congratulations!

            </h2>

            <div class="result-card">

                <h3>Score</h3>

                <p id="score">

                    0 / 10

                </p>

            </div>

            <div class="result-card">

                <h3>Percentage</h3>

                <p id="percentage">

                    0%

                </p>

            </div>

            <div class="result-card">

                <h3>Performance</h3>

                <p id="performance">

                    -

                </p>

            </div>

            <div class="buttons">

                <button id="retakeBtn">

                    Retake Test

                </button>

                <button id="dashboardBtn">

                    Back to Dashboard

                </button>

            </div>

        </div>

    </div>

    <script src="js/results.js"></script>

</body>

</html>
