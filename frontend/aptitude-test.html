<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Aptitude Test | AptiResume AI</title>

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="css/aptitude-test.css">

</head>

<body>

    <div class="test-container">

        <div class="test-box">

            <h1>Aptitude Test</h1>

            <p id="userName">

                Welcome

            </p>

            <div class="timer">

                Time Left:
                <span id="time">

                    30:00

                </span>

            </div>

            <div class="progress">

                Question

                <span id="questionNumber">

                    1

                </span>

                of

                <span id="totalQuestions">

                    10

                </span>

            </div>

            <h2 id="question">

                Loading Question...

            </h2>

            <div class="options">

                <button class="option">Option 1</button>

                <button class="option">Option 2</button>

                <button class="option">Option 3</button>

                <button class="option">Option 4</button>

            </div>

            <div class="navigation">

    <button id="prevBtn">

        Previous

    </button>

    <button id="submitBtn">

        Submit Test

    </button>

    <button id="nextBtn">

        Next

    </button>

</div>

        </div>

    </div>

    <script src="js/aptitude-test.js"></script>

</body>

</html>
