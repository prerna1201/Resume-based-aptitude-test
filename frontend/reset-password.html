<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reset Password | AptiResume AI</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="css/reset-password.css">

</head>

<body>

<div class="reset-container">

    <div class="reset-card">

        <h2>🔒 Reset Password</h2>

        <p>Create a new secure password for your account.</p>

        <label>New Password</label>

        <div class="password-box">

            <input
                type="password"
                id="newPassword"
                placeholder="Enter New Password">

            <i
                class="bi bi-eye-slash"
                id="togglePassword"></i>

        </div>

        <label>Confirm Password</label>

        <div class="password-box">

            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm Password">

            <i
                class="bi bi-eye-slash"
                id="toggleConfirmPassword"></i>

        </div>

        <!-- Password Strength -->

        <div class="strength">

            <div class="progress">

                <div
                    id="strengthBar"
                    class="progress-bar"
                    style="width:0%">
                </div>

            </div>

            <small id="strengthText">

                Password Strength

            </small>

        </div>

        <ul class="rules">

            <li id="lengthRule">❌ Minimum 8 characters</li>

            <li id="upperRule">❌ One Uppercase Letter</li>

            <li id="lowerRule">❌ One Lowercase Letter</li>

            <li id="numberRule">❌ One Number</li>

            <li id="specialRule">❌ One Special Character</li>

        </ul>

        <button
            class="btn btn-primary w-100 mt-3"
            id="savePassword">

            Save Password

        </button>

        <a
            href="login.html"
            class="back-link">

            ← Back to Login

        </a>

    </div>

</div>

<script src="js/reset-password.js"></script>

</body>

</html>
