<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Resume Analysis | AptiResume AI</title>

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
          href="css/resume-analysis.css">

</head>

<body>

    <div class="analysis-container">

        <div class="analysis-box">

            <h1 id="candidateName">

                Resume Analysis

            </h1>

            <p class="status">

                <i class="bi bi-check-circle-fill"></i>

                Resume Successfully Analyzed

            </p>

            <h2>

                Skills Detected

            </h2>

            <div class="skills-container">

                <span class="skill">HTML</span>

                <span class="skill">CSS</span>

                <span class="skill">JavaScript</span>

                <span class="skill">Bootstrap</span>

                <span class="skill">React</span>

                <span class="skill">Communication</span>

                <span class="skill">Problem Solving</span>

                <span class="skill">Teamwork</span>

            </div>

            <div class="recommendation">

                <h2>

                    Recommended Domain

                </h2>

                <p>

                    Frontend Developer

                </p>

            </div>

            <button id="generateTestBtn">

                Generate Aptitude Test

            </button>

        </div>

    </div>

    <script src="js/resume-analysis.js"></script>

</body>

</html>
