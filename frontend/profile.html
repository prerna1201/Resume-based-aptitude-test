<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Profile | AptiResume AI</title>

    <!-- Google Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="css/profile.css">

</head>

<body>

    <!-- =========================
            Navbar
    ========================== -->

    <nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">

        <div class="container">

            <a class="navbar-brand fw-bold text-primary"
                href="index.html">

                AptiResume AI

            </a>

            <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
                id="navbarNav">

                <ul class="navbar-nav mx-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="index.html#features">Features</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="index.html#workflow">Workflow</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="index.html#faq">FAQ</a>
                    </li>

                </ul>

                <div id="authSection"></div>

            </div>

        </div>

    </nav>

    <!-- =========================
            Profile
    ========================== -->

    <div class="profile-container">

        <!-- Left -->

        <div class="profile-card">

            <img src="https://i.pravatar.cc/200"
                id="profileImage">

            <input
                type="file"
                id="imageInput"
                hidden>

            <button id="changePhoto">

                <i class="bi bi-camera-fill"></i>

                Change Photo

            </button>

            <h2 id="profileName">

                User Name

            </h2>

            <p id="profileEmail">

                user@email.com

            </p>

        </div>

        <!-- Right -->

        <div class="details-card">

            <h3>General Information</h3>

            <div class="row">

                <div class="col-md-6">

                    <label>Full Name</label>

                    <input
                        type="text"
                        id="fullName">

                </div>

                <div class="col-md-6">

                    <label>Email</label>

                    <input
                        type="email"
                        id="email"
                        readonly>

                </div>

                <div class="col-md-6">

                    <label>College</label>

                    <input
                        type="text"
                        id="college">

                </div>

                <div class="col-md-6">

                    <label>Branch</label>

                    <input
                        type="text"
                        id="branch">

                </div>

                <div class="col-md-6">

                    <label>Year</label>

                    <input
                        type="text"
                        id="year">

                </div>

            </div>

            <hr>

            <h3>Resume</h3>

            <p>

                📄 Resume Uploaded

            </p>

            <button class="btn btn-primary">

                Upload New Resume

            </button>

            <hr>

            <h3>Statistics</h3>

            <ul>

                <li>Tests Attempted : <span id="tests">0</span></li>

                <li>Highest Score : <span id="highest">0%</span></li>

                <li>Average Score : <span id="average">0%</span></li>

            </ul>

            <hr>

            <h3>Security</h3>

            <a href="reset-password.html"
class="btn btn-warning">

Reset Password

</a>

            <br><br>

            <button
                class="btn btn-success"
                id="saveProfile">

                Save Changes

            </button>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/main.js"></script>

    <script src="js/profile.js"></script>

</body>

</html>
